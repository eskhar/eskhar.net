<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AIMP - Эфир Эсхара (ESKHAR)</title>
    <style>
        body {
            background-color: #0b0b0b;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            font-family: "Tahoma", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #ff9900;
        }

        /* Корпус плеера */
        .aimp-container {
            width: 450px;
            background: linear-gradient(180deg, #333 0%, #111 100%);
            border: 2px solid #444;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 0 30px rgba(255, 153, 0, 0.3);
            position: relative;
        }

        /* Верхняя панель (Заголовок) */
        .aimp-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 11px;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }

        /* Дисплей с визуализацией */
        .aimp-display {
            background: #000;
            border: 1px solid #ff9900;
            height: 60px;
            margin-bottom: 15px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .track-name {
            font-family: "Courier New", monospace;
            font-size: 13px;
            color: #ff9900;
            overflow: hidden;
            white-space: nowrap;
        }

        /* Слот для виджета SoundCloud */
        .sc-widget-container {
            background: #000;
            border: 1px solid #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .back-link {
            position: absolute;
            top: -35px;
            left: 0;
            color: #ff9900;
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
        }
        .back-link:hover { text-decoration: underline; }

        footer {
            margin-top: 15px;
            text-align: center;
            font-size: 10px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="aimp-container">
    <a href="index.html" class="back-link">← Вернуться в архив поселка</a>

    <div class="aimp-header">
        <span>ESKHAR_AUDIO_PLAYER_V2.0</span>
        <span style="color: #666;">_ _ □ X</span>
    </div>

    <div class="aimp-display">
        <div class="track-name">
            <marquee behavior="scroll" direction="left">ПРОЕКТ: ESKHAR — АЛЬБОМ: ПОСТ-ПАНК ИЗ ПУСТОТЫ — СТАТУС: ВОСПРОИЗВЕДЕНИЕ</marquee>
        </div>
    </div>

    <div class="sc-widget-container">
        <iframe 
            width="100%" 
            height="100" 
            scrolling="no" 
            frameborder="no" 
            allow="autoplay" 
            src="https://soundcloud.com/eskhar_mus/sportivnye-ochki-buerak-cover-7?in=eskhar_mus/sets/sobranje&si=b19925a648904d38a2605ec47cbc317b&utm_source=clipboard&utm_medium=text&utm_campaign=social_sharing">
        </iframe>
    </div>

    <footer>
        ЭФИР ЭСХАР // ИНДУСТРИАЛЬНЫЙ ЗВУК // 2026
    </footer>
</div>

</body>
</html>
